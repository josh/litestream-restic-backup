{{- include "litestream-restic-backup.validate" . -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "litestream-restic-backup.fullname" . }}
  labels:
    {{- include "litestream-restic-backup.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  {{- with .Values.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      {{- with .Values.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "litestream-restic-backup.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: backup
              image: {{ include "litestream-restic-backup.image" . | quote }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              command: ["backup.sh"]
              env:
                - name: RESTIC_REPOSITORY
                  value: {{ .Values.restic.repository | quote }}
                - name: RESTIC_HOST
                  value: {{ .Values.database.name | quote }}
                - name: RESTIC_TAG
                  value: {{ .Values.restic.tag | quote }}
                {{- with .Values.restic.ageIdentity.existingSecret }}
                - name: RESTIC_AGE_IDENTITY_FILE
                  value: {{ $.Values.restic.ageIdentity.mountPath | quote }}
                {{- end }}
                {{- with .Values.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- if or .Values.litestream.existingSecret .Values.restic.existingSecret }}
              envFrom:
                {{- with .Values.litestream.existingSecret }}
                - secretRef:
                    name: {{ . }}
                {{- end }}
                {{- with .Values.restic.existingSecret }}
                - secretRef:
                    name: {{ . }}
                {{- end }}
              {{- end }}
              volumeMounts:
                - name: work
                  mountPath: /work
                - name: litestream-config
                  mountPath: /etc/litestream.yml
                  subPath: {{ .Values.litestream.configKey }}
                  readOnly: true
                {{- with .Values.restic.ageIdentity.existingSecret }}
                - name: restic-secrets
                  mountPath: /run/secrets
                - name: restic-age-identity
                  mountPath: {{ $.Values.restic.ageIdentity.mountPath }}
                  subPath: identity
                  readOnly: true
                {{- end }}
              {{- with .Values.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          volumes:
            - name: work
              emptyDir:
                sizeLimit: {{ .Values.work.sizeLimit }}
            - name: litestream-config
              {{- if .Values.litestream.existingConfigSecret }}
              secret:
                secretName: {{ .Values.litestream.existingConfigSecret }}
              {{- else }}
              configMap:
                name: {{ include "litestream-restic-backup.configMapName" . }}
              {{- end }}
            {{- with .Values.restic.ageIdentity.existingSecret }}
            - name: restic-secrets
              emptyDir: {}
            - name: restic-age-identity
              secret:
                secretName: {{ . }}
                items:
                  - key: {{ $.Values.restic.ageIdentity.secretKey }}
                    path: identity
            {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
