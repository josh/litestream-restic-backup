image:
  repository: ghcr.io/josh/litestream-restic-backup
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

schedule: "0 * * * *"
concurrencyPolicy: Forbid
startingDeadlineSeconds: 600
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 5
backoffLimit: 2

database:
  name: app

litestream:
  replicaURL: ""
  config: ""
  existingConfigSecret: ""
  configKey: litestream.yml
  existingSecret: litestream

restic:
  repository: ""
  existingSecret: restic
  tag: litestream
  ageIdentity:
    existingSecret: ""
    secretKey: RESTIC_AGE_IDENTITY
    mountPath: /run/secrets/restic-age-identity

extraEnv: []

work:
  sizeLimit: 5Gi

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
