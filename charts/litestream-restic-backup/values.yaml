image:
  repository: ghcr.io/josh/litestream-restic-backup
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

schedule: "0 * * * *"
concurrencyPolicy: Forbid
startingDeadlineSeconds: 600
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 5
backoffLimit: 2
# ttlSecondsAfterFinished: 86400

database:
  name: app # pod hostname -> restic host; must be a DNS label

# You provide the Secrets — the chart never creates them. Each existingSecret is exposed to
# the container via envFrom, so its keys become env vars directly.

# Set replicaURL, or a verbatim config (its db `path` must be /work/db.sqlite), or existingConfigSecret.
# replicaURL/config render to a ConfigMap — keep creds out; use existingConfigSecret for those.
litestream:
  replicaURL: ""
  config: ""
  existingConfigSecret: "" # Secret holding the config (for credential-bearing configs)
  configKey: litestream.yml # key/filename within the ConfigMap or Secret
  # Source-replica credentials. Expected keys: LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY.
  # Set to "" if the replica needs no creds (e.g. file://).
  existingSecret: litestream

restic:
  repository: ""
  # Restic credentials. Expected keys: RESTIC_PASSWORD (+ backend creds like AWS_* if needed).
  existingSecret: restic

extraEnv: []

work:
  sizeLimit: 5Gi

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
